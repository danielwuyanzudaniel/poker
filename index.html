<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CB POKER - 职业赛场</title>
    <style>
        :root { 
            --bg-dark: #2d4332;       
            --text-main: #e8e3d3;     
            --panel-bg: #233427;      
            --table-inner: #1c2a1f;   
            --active-green: #e8e3d3; 
        }
        
        /* 🚨 核心重构1：锁定视窗，彻底禁用滚动和下拉刷新 */
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100dvh; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Times New Roman', SimSun, 'Songti SC', STSong, serif; 
            font-weight: bold; 
            overflow: hidden !important; 
            overscroll-behavior: none !important; /* 禁用 Safari 弹性下拉刷新 */
            touch-action: manipulation !important; /* 禁用双击缩放 */
            -webkit-user-select: none; /* 防止误触选中文本 */
        }
        
        /* 通用类 */
        .hidden { display: none !important; opacity: 0; pointer-events: none; } 

        /* 🚨 核心重构2：使用 CSS Grid 将游戏界面划分为 头、中、尾 三大物理隔离的安全区块 */
        .view-screen { 
            position: fixed; 
            inset: 0; 
            /* 完美避开 iPhone 刘海屏、Dynamic Island 和底部小白条 */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            box-sizing: border-box;
            background-color: var(--bg-dark);
            z-index: 10;
        }

        #view-game {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr auto; /* 顶部自适应，中间吃满，底部自适应 */
            grid-template-areas: 
                "header"
                "board"
                "footer";
            width: 100%;
            height: 100%;
            justify-items: center;
        }

        /* ============== [头部区域] ============== */
        .game-header-wrapper {
            grid-area: header;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 20px;
            pointer-events: none; /* 穿透点击，避免遮挡牌桌 */
            z-index: 90;
        }
        .game-header-wrapper > * { pointer-events: auto; }
        .top-left-btns { display: flex; gap: 15px; }
        .top-right-btns { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }

        /* ============== [牌桌主区域] ============== */
        .game-board-wrapper {
            grid-area: board;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* 🚨 核心重构3：使用 vw/vh 实现牌桌的物理级自适应，绝不使用 scale */
        .poker-table { 
            width: 70vw; 
            height: 60vh; 
            max-width: 1100px; 
            max-height: 500px; 
            position: relative; 
            background: radial-gradient(circle, var(--bg-dark) 0%, var(--table-inner) 100%); 
            border: 1.5vw solid var(--text-main); 
            border-radius: 50vw; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 40px rgba(0,0,0,0.3); 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .table-inner-line { position: absolute; inset: 30px; border: 2px solid rgba(232, 227, 211, 0.2); border-radius: 200px; pointer-events: none; display: flex; justify-content: center; align-items: center;}
        .table-logo { color: rgba(232, 227, 211, 0.3); font-size: clamp(20px, 3vw, 38px); font-weight: 900; letter-spacing: 10px; pointer-events: none;}
        
        /* 百分比定位座位，死死绑定在牌桌边缘 */
        .player-seat { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); transition: all 0.3s ease;}
        .s-btm-c { top: 105%; left: 50%; } .s-lft-b { top: 80%; left: 0%; } .s-lft-t { top: 20%; left: 0%; } 
        .s-top-l { top: -5%; left: 25%; } .s-top-c { top: -5%; left: 50%; } .s-top-r { top: -5%; left: 75%; } 
        .s-rgt-t { top: 20%; left: 100%; } .s-rgt-b { top: 80%; left: 100%; } .s-btm-r { top: 105%; left: 75%; } .s-btm-l { top: 105%; left: 25%; }

        .player-card { width: 110px; min-height: 85px; background: var(--panel-bg); border-radius: 8px; border: 3px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; color: var(--text-main);}
        .player-card.active { border-color: var(--text-main); box-shadow: 0 0 25px rgba(232,227,211, 0.5); }
        .player-card.active .player-chips { background: var(--text-main); color: var(--bg-dark); }
        
        /* UI 细节重构 (保持原样，仅优化单位) */
        .player-avatar span { font-size: 26px; }
        .player-name { font-size: 12px; margin-top: auto; padding-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; font-weight:900; }
        .player-chips { background: var(--bg-dark); border-top: 1px solid rgba(232,227,211,0.2); text-align: center; font-size: 13px; font-weight: bold; padding: 5px 0; border-radius: 0 0 6px 6px; }
        
        /* 发牌区、公共牌区 */
        .card-placeholders { position: absolute; display: flex; gap: 8px; z-index: 2; pointer-events: none; }
        .card-placeholder { width: 50px; height: 72px; border: 2px solid rgba(232, 227, 211, 0.3); border-radius: 5px; }
        #ui-board, #ui-burn { position: absolute; display: flex; gap: 8px; z-index: 5; }
        .pot-display-container { position: absolute; top: -45px; background: var(--bg-dark); border: 1px solid var(--text-main); padding: 4px 20px; border-radius: 30px; text-align: center; }
        .pot-value { font-size: 20px; font-weight: 900; }

        .playing-card { background: white; color: #000; width: 50px; height: 72px; border-radius: 5px; font-weight: 900; font-size: 28px; display: flex; justify-content: center; align-items: center; border: 1px solid #ccc; position: relative;}
        .playing-card.red { color: #ff0000; }
        .playing-card.back { background-color: #b31b1b !important; border: 3px solid #fff !important; color: transparent !important; }
        .hole-cards { position: absolute; display: flex; z-index: 5; }
        .card-1 { margin-right: -10px; z-index: 1; } .card-2 { z-index: 2; }
        
        /* 修正手牌和徽章显示位置 */
        .pos-bottom .hole-cards { top: -55px; left: 50%; transform: translateX(-50%); } 
        .pos-top .hole-cards { bottom: -55px; left: 50%; transform: translateX(-50%); }
        .s-lft-t .hole-cards, .s-lft-b .hole-cards, .s-rgt-t .hole-cards, .s-rgt-b .hole-cards { top: -55px; left: 50%; transform: translateX(-50%); }

        /* ============== [底部操作区域] ============== */
        .game-footer-wrapper {
            grid-area: footer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none; /* 穿透背景 */
            padding-bottom: 10px;
        }
        .game-footer-wrapper > * { pointer-events: auto; }

        .action-console { 
            background: var(--panel-bg); 
            border: 2px solid var(--text-main); 
            border-radius: 16px; 
            padding: 15px; 
            width: 100%; 
            max-width: 600px; /* 适当拓宽以适应横排 */
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            position: relative;
        }

        .raise-control-area { display: flex; flex-direction: column; gap: 10px; background: var(--bg-dark); padding: 12px; border-radius: 12px; border: 1px solid rgba(232,227,211,0.3); }
        .raise-header { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--text-main); font-weight: bold; }
        .custom-slider { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(232,227,211,0.3); border-radius: 3px; outline: none; margin: 8px 0; }
        .custom-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--text-main); cursor: pointer; border: 3px solid var(--bg-dark); }
        .quick-bet-row { display: flex; gap: 8px; }
        .qb-btn { flex: 1; background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--text-main); padding: 8px 0; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: bold;}
        
        /* 🚨 操作大按钮，优化单手触控区域 */
        .main-action-row { display: flex; gap: 10px; height: 65px; }
        .action-btn { flex: 1; border: 2px solid var(--text-main); border-radius: 12px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-family: inherit;}
        .btn-title { font-size: 18px; font-weight: 900; letter-spacing: 1px; color: var(--text-main); }
        .btn-sub { font-size: 12px; font-weight: bold; opacity: 0.9; margin-top: 2px; }
        
        .btn-fold { background: linear-gradient(145deg, #7f8c8d, #34495e); }
        .btn-call { background: linear-gradient(145deg, #2ecc71, #219653); }
        .btn-call .btn-title, .btn-call .btn-sub { color: #111; }
        .btn-raise { background: linear-gradient(145deg, #ff4757, #c0392b); }
        .btn-raise .btn-title, .btn-raise .btn-sub { color: white; }

        /* ============== [独立脱轨侧边栏与浮层] ============== */
        
        /* 🚨 核心重构4：房主控制台改为纯粹的侧边抽屉 */
        .host-panel { 
            position: fixed; 
            top: 0; 
            bottom: 0; 
            right: -100%; /* 默认完全藏入屏幕外 */
            width: 35vw; /* 永远不超过屏幕的 35% */
            max-width: 300px;
            background: var(--panel-bg); 
            padding: 20px 15px; 
            border-left: 2px solid var(--text-main); 
            z-index: 1000; 
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: right 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            /* 支持安全区域 */
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: env(safe-area-inset-bottom);
        }
        .host-panel.open { right: 0; }
        .panel-toggle-tab { 
            position: absolute; 
            left: -42px; 
            top: max(20px, env(safe-area-inset-top)); 
            background: var(--panel-bg); 
            border: 2px solid var(--text-main); 
            border-right: none; 
            padding: 12px 10px; 
            border-radius: 8px 0 0 8px; 
            cursor: pointer; 
            font-size: 20px; 
            pointer-events: auto;
        }
        .host-btn { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; border: 2px solid var(--text-main); cursor: pointer; font-family: inherit;}
        
        /* 🚨 核心重构5：聊天框折叠机制优化 */
        #chat-zone { 
            position: fixed; 
            bottom: max(100px, env(safe-area-inset-bottom) + 80px); /* 悬浮在操作台之上 */
            left: max(20px, env(safe-area-inset-left)); 
            width: 280px; 
            display: flex; 
            flex-direction: column; 
            z-index: 950; /* 极高层级，绝不被牌桌挡住 */
            pointer-events: none; 
        }
        #chat-zone > * { pointer-events: auto; }
        
        /* 隐藏聊天记录和工具栏，直到 focus-within 激活 */
        #chat-list, .chat-tools { 
            display: none; /* 使用 display 彻底物理移除占位 */
            background: rgba(35, 52, 39, 0.95); 
            border: 2px solid var(--text-main); 
            border-radius: 12px; 
            margin-bottom: 8px; 
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #chat-zone:focus-within #chat-list { display: flex; flex-direction: column; height: 160px; overflow-y: auto; gap: 8px; }
        #chat-zone:focus-within .chat-tools { display: flex; flex-direction: column; gap: 10px; }
        
        #chat-input { 
            background: var(--bg-dark); 
            border: 2px solid var(--text-main); 
            color: var(--text-main); 
            padding: 12px 15px; 
            border-radius: 20px; 
            outline: none; 
            width: 100%; 
            box-sizing: border-box; 
            font-family: inherit;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        /* ============== [基础规则样式补充] ============== */
        .top-btn, .rules-box, .lobby-zone, .input-code, .btn-join, .menu-card, .action-btn { font-family: inherit; }
        .rules-box { background: var(--panel-bg); border: 1px solid var(--text-main); padding: 8px 12px; border-radius: 12px; display: flex; gap: 10px; }
        .status-on { color: var(--active-green); } .status-off { color: #e74c3c; }

        /* ============== [手机端超级响应式横屏强化] ============== */
        @media screen and (max-width: 1024px) {
            
            /* 让牌桌在手机横屏下变得更紧凑扁长，防止出界 */
            .poker-table { 
                width: 85vw; 
                height: 45vh; 
                border-width: 1.5vw; 
                border-radius: 100px;
            }
            
            /* 缩小座位和字号，防止互相重叠 */
            .player-card { width: 85px; min-height: 60px; }
            .player-avatar span { font-size: 20px; }
            .player-name { font-size: 10px; }
            .player-chips { font-size: 11px; padding: 2px 0; }
            .dealer-btn { width: 18px; height: 18px; font-size: 9px; }
            
            /* 底部操作区在手机上变成左右横向布局，腾出垂直空间给牌桌 */
            .action-console { 
                flex-direction: row; 
                align-items: center; 
                width: 100vw; 
                max-width: 100%; 
                border-radius: 0; 
                border-left: none; border-right: none; border-bottom: none;
                margin: 0;
                padding: 10px max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
            }
            .raise-control-area { flex: 1; padding: 8px; margin: 0; border-right: 1px solid #555; border-bottom: none; }
            .main-action-row { flex: 1.5; padding-left: 10px; height: 60px; }
            .action-btn { font-size: 16px; min-height: 50px; }
            
            /* 调整手机版 Chat 宽度，不遮挡牌局 */
            #chat-zone { width: 220px; }
        }

        /* ...保留你原有的弹幕、动画效果 CSS 代码即可... */
        /* 下面这段是防丢失，简单补上重要的动画类 */
        .chat-fx-container { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; pointer-events: none; text-align: center;}
        .effect-banner { background: #eae2d0; color: #2b3d2f; border: 6px solid #2b3d2f; border-radius: 20px; padding: 20px 50px; font-size: clamp(30px, 5vw, 60px); font-weight: 900; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .anim-popZoom { animation: popZoom 2.5s forwards; }
        @keyframes popZoom { 0% { transform: scale(0); opacity: 0; } 20% { transform: scale(1.3); opacity: 1; } 80% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

    </style>
</head>
<body>

    <div id="view-game" class="view-screen">
        
        <div class="game-header-wrapper">
            <div class="top-left-btns" id="top-left-btns">
                <button class="top-btn btn-log hidden" id="btn-log-top" onclick="toggleLogDrawer()">📝 记录</button>
            </div>

            <div class="top-right-btns" id="top-right-btns">
                <div id="game-rules-box" class="rules-box hidden">
                    <div><span class="rule-label">模式:</span> <strong id="rule-mode">普通</strong></div>
                    <div><span class="rule-label">Stand Up:</span> <strong id="rule-standup" class="status-off">Inactive</strong></div>
                    <div><span class="rule-label">2-7 赏金:</span> <strong id="rule-27" class="status-off">Inactive</strong></div>
                </div>
                <button class="top-btn btn-ledger hidden" id="btn-ledger-top" onclick="openLedger()">📊 战绩表</button>
                <div id="standup-widget" class="hidden">
                    <button id="toggle-standup-btn" class="top-btn" onclick="toggleStandupList()">🧍‍♂️ 生存名单 ▼</button>
                    </div>
            </div>
        </div>

        <div id="table-container" class="game-board-wrapper">
            <div class="poker-table">
                <div class="table-inner-line"><div class="table-logo">CHEAPER BROTHERS</div></div>
                <div class="card-placeholders">
                    <div class="card-placeholder"></div><div class="card-placeholder"></div><div class="card-placeholder"></div><div class="card-placeholder"></div><div class="card-placeholder"></div>
                </div>
                <div class="pot-display-container">
                    <span class="pot-label">TOTAL POT</span><span class="pot-value" id="ui-pot">￥0</span>
                </div>
                <div id="ui-burn"></div>
                <div id="ui-board"></div>
                <div id="players-layer"></div>
            </div>
        </div>

        <div class="game-footer-wrapper">
            <div id="action-console" class="action-console hidden">
                <div class="turn-badge">YOUR TURN</div>
                <div class="raise-control-area">
                    <div class="raise-header">
                        <span>Raise To:</span>
                        <div style="display:flex; align-items:center; background:var(--panel-bg); border: 1px solid var(--text-main); border-radius: 8px; padding: 4px 10px;">
                            <span style="color:var(--text-main); font-weight:900;">￥</span>
                            <input type="number" class="raise-amount-input" id="input-raise-amount" step="0.5" style="width:60px; background:transparent; border:none; color:white; font-size:16px; font-weight:bold; outline:none;">
                        </div>
                    </div>
                    <input type="range" class="custom-slider" id="raise-slider" step="0.25">
                    <div class="quick-bet-row">
                        <button class="qb-btn" onclick="quickBet('MIN')">MIN</button>
                        <button class="qb-btn" onclick="quickBet('HALF')">1/2</button>
                        <button class="qb-btn" onclick="quickBet('POT')">POT</button>
                        <button class="qb-btn all-in" onclick="quickBet('ALLIN')">ALL-IN</button>
                    </div>
                </div>
                <div class="main-action-row">
                    <button class="action-btn btn-fold" id="btn-action-fold"><span class="btn-title">FOLD</span><span class="btn-sub">弃牌</span></button>
                    <button class="action-btn btn-call" id="btn-action-call"><span class="btn-title" id="btn-call-title">CALL</span><span class="btn-sub" id="btn-call-sub">￥0</span></button>
                    <button class="action-btn btn-raise" id="btn-action-raise"><span class="btn-title">RAISE</span><span class="btn-sub" id="btn-raise-sub">￥0</span></button>
                </div>
            </div>
            
            <div id="pre-action-console" class="action-console hidden">...</div>
            <div id="buyin-console" class="action-console hidden">...</div>
        </div>

        <div id="chat-zone" class="hidden">
            <div id="chat-list"></div>
            <div class="chat-tools">
                </div>
            <input type="text" id="chat-input" placeholder="输入闲聊信息 (点击展开)..." autocomplete="off">
        </div>

        <div class="host-panel hidden" id="host-panel">
            <div class="panel-toggle-tab" onclick="toggleHostPanel()">⚙️</div>
            <div style="font-weight:bold; color:var(--text-main);">👑 房主控制台</div>
            <button class="host-btn" style="background:var(--bg-dark); color:var(--text-main);">⚙️ 修改规则</button>
            <button class="host-btn btn-green">▶ 开始新一局</button>
            <button class="host-btn btn-red">⏸️ 中止并退款</button>
        </div>

    </div>

<script>
    // JS 层只需移除双指引擎（因为现在原生的 responsive 已经解决一切）
    // 移除所有关于 tScale, initPinchDist, translate(...) 的缩放逻辑。
    // 其他如 websocket, 渲染玩家数据的 renderEngine 保持 100% 不变！
    
    // 你现有的 toggleHostPanel 函数依然完美生效：
    function toggleHostPanel() {
        const hp = document.getElementById('host-panel');
        if (hp) hp.classList.toggle('open');
    }
</script>
</body>
</html>
